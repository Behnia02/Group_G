# models.yaml
# -----------
# AI model configuration for Project Okavango - Page 2
# This file is read at runtime by app/ai_analysis.py
# Edit prompts and model names here without touching Python code.

# -----------------------------------------------------------------------
# Vision model — analyses the satellite image
# -----------------------------------------------------------------------
vision_model: "llava"

vision_prompt: >
  You are an environmental analyst.
  Describe what you see in this satellite image in 3-5 sentences.
  Focus on land use, vegetation cover, water bodies, urban development,
  and any visible signs of environmental stress or human activity.

# Image download settings
zoom_default: 12
image_grid_size: 3        # NxN tiles stitched together
tile_source: "ESRI World Imagery"

# -----------------------------------------------------------------------
# Text model — assesses environmental risk from the image description
# -----------------------------------------------------------------------
text_model: "llama3.2"

text_prompt: >
  You are an environmental risk assessor working for a UN conservation programme.
  Given the following satellite image description, answer these questions briefly:

  1. Is there evidence of deforestation or vegetation loss?
  2. Are there signs of land degradation or desertification?
  3. Is there visible pollution, mining, or heavy industrial activity?
  4. Are water bodies healthy or showing signs of stress (shrinking, discoloured)?
  5. Are there signs of urban sprawl encroaching on natural areas?

  After answering, give a final verdict on a new line:
  If ANY of the above suggest environmental danger, end with: VERDICT: YES
  Otherwise end with: VERDICT: NO

  Description: {description}

# Text model settings
max_tokens: 512
temperature: 0.3
