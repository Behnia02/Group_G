# Configuration for the structured image-description model
# The model now returns standardized JSON instead of free text.

image_model:
  name: llava:7b
  prompt: >
    You are analyzing a satellite image.

    Return ONLY valid JSON.
    Do not use markdown.
    Do not include code fences.
    Do not guess hidden causes.
    Do not perform environmental risk assessment.
    Describe only what is visibly present.

    Look for both obvious and subtle visual features, including:
    - dominant land cover
    - vegetation density and vegetation pattern
    - patchiness or vegetation interruption
    - bare soil exposure
    - water presence and water appearance
    - visible roads, buildings, linear clearings, or other human disturbance
    - signs of fragmentation or land-cover transitions
    - visible burn scars, smoke, or ash if present

    Use conservative wording.
    If something is not clearly visible, say "unknown" instead of guessing.

    Return exactly this JSON schema:
    {
      "dominant_land_cover": "",
      "vegetation_density": "low|medium|high|unknown",
      "vegetation_pattern": "continuous|patchy|fragmented|unknown",
      "bare_soil_visibility": "none|low|medium|high|unknown",
      "water_presence": "none|small|moderate|large|unknown",
      "water_appearance": "clear|sediment_heavy|dark|unknown",
      "fragmentation_visibility": "none|low|medium|high|unknown",
      "human_disturbance": "none|low|medium|high|unknown",
      "fire_or_smoke_visibility": "none|possible|clear|unknown",
      "summary": ""
    }
  max_size: 768
  quality: 80
  timeout: 240
  auto_pull: true


# Configuration for the risk-analysis model
# The task is split into:
# 1. visual evidence
# 2. context evidence
# The model no longer invents the final score directly

text_model:
  name: llava:7b
  timeout: 180
  auto_pull: true
  prompt: >
    You are an environmental risk analyst.

    You will receive:
    1. A structured satellite-image description.
    2. Country-level environmental indicator context.

    Your task has two separate groups:
    1. Visual evidence from the image description
    2. Country-level context evidence from the dataset

    Important rules:
    - Keep visual evidence and context evidence separate.
    - Image evidence is local.
    - Dataset context is national and historical.
    - Do not treat country-level context as exact proof for the local site.
    - Do not invent a final score.
    - Only classify evidence states and explain them briefly.
    - Use conservative reasoning.
    - If the evidence is absent, use "none".
    - If the evidence is ambiguous or incomplete, use "unclear".
    - If the evidence is supported by the description or context, use "present".

    For visual evidence, consider not only extreme disaster signs but also moderate environmental stress such as:
    - patchy or interrupted vegetation
    - exposed soil
    - fragmented land cover
    - unusual land transitions
    - human disturbance
    - sediment-heavy or unusual water appearance
    - linear clearings, roads, sprawl, or other ecosystem pressure

    Return ONLY valid JSON.
    Do not use markdown.
    Do not include code fences.

    Return exactly this schema:
    {
      "visual_evidence": {
        "vegetation_loss": {"state": "none", "reason": ""},
        "land_degradation": {"state": "none", "reason": ""},
        "water_anomaly": {"state": "none", "reason": ""},
        "fire_signs": {"state": "none", "reason": ""},
        "fragmentation": {"state": "none", "reason": ""}
      },
      "context_evidence": {
        "forest_change_pressure": {"state": "none", "reason": ""},
        "land_degradation_pressure": {"state": "none", "reason": ""},
        "protection_gap": {"state": "none", "reason": ""}
      },
      "overall_reason": ""
    }

# Thresholds for the final Python-side label assignment


risk_thresholds:
  high: 1.35
  moderate: 0.65